<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Sistem Cetak Kartu Santri Otomatis</title>
  <link rel="stylesheet" href="style.css">
  <script src="script.js"></script>
</head>
<body>

  <!-- ==================== UI PANEL SETTING MAPPING (TIDAK IKUT DICETAK) ==================== -->
  <div id="mapping-panel" class="no-print">
    <h3>⚙️ Pengaturan Mapping Kolom Kartu</h3>
    <p>Cocokkan tanda template (kiri) dengan nama kolom yang ada di file Excel/CSV Anda (kanan):</p>
    
    <div class="mapping-grid" id="mapping-form">
      <!-- Dropdown pilihan kolom akan muncul otomatis di sini lewat JavaScript -->
    </div>
    
    <button onclick="terapkanMapping()" class="btn-apply">Terapkan & Update Tampilan Kartu</button>
  </div>

  <!-- ==================== AREA HASIL MERGE KARTU SIAP CETAK ==================== -->
  <div id="print-area"></div>

  <!-- ==================== MASTER TEMPLATE DESAIN KARTU (DISUBSTITUSI OTOMATIS) ==================== -->
  <template id="card-template">
    <div class="desain-kartu-santri">
      
      <!-- Komponen teks data melayang di atas gambar Picture1.png -->
      <div class="txt-no-urut">No. Urut: {{NO_URUT}}</div>
      <div class="txt-kelas">Kelas: {{KELAS}}</div>
      <div class="txt-nama">{{NAMA}}</div>
      <div class="txt-pengampu">Pengampu: {{PENGAMPU}}</div>
      <div class="txt-penguji">Penguji: {{PENGUJI}}</div>
      <div class="txt-keterangan">Ket: {{KET}}</div>

    </div>
  </template>

</body>
</html>
