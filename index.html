<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Sistem Cetak Kartu Santri Otomatis</title>
  <link rel="stylesheet" href="style.css">
  <script src="script.js"></script>
</head>
<body>

  <!-- ==================== UI PANEL SETTING & EDITOR (TIDAK IKUT DICETAK) ==================== -->
  <div id="control-panel" class="no-print">
    <h2>⚙️ Pengaturan & Editor Posisi Kartu</h2>
    
    <div class="tabs">
      <button id="btn-tab-mapping" class="tab-btn active" onclick="switchTab('mapping')">1. Mapping Kolom</button>
      <button id="btn-tab-posisi" class="tab-btn" onclick="switchTab('posisi')">2. Edit Posisi Teks</button>
    </div>

    <!-- Tab 1: Mapping Kolom -->
    <div id="tab-mapping" class="tab-content">
      <p>Cocokkan tanda template (kiri) dengan nama kolom di file Excel/CSV Anda (kanan):</p>
      <div class="mapping-grid" id="mapping-form"></div>
    </div>

    <!-- Tab 2: Pengatur Posisi -->
    <div id="tab-posisi" class="tab-content" style="display:none;">
      <p>Geser nilai di bawah ini untuk mengatur letak teks langsung pada gambar kartu:</p>
      <div id="position-form"></div>
    </div>
    
    <div class="panel-actions">
      <button id="btn-mode-preview" onclick="setMode('preview')" class="btn-secondary">✏️ Mode Edit (1 Kartu)</button>
      <button id="btn-mode-print" onclick="setMode('print')" class="btn-primary">🖨️ Kunci & Siapkan Cetak (6 Kartu/Lembar)</button>
    </div>
  </div>

  <!-- ==================== AREA UTAMA TAMPILAN (PREVIEW / CETAK) ==================== -->
  <div id="main-display"></div>

  <!-- ==================== MASTER TEMPLATE UNTUK GENERATOR ==================== -->
  <template id="card-template">
    <div class="desain-kartu-santri">
      <div class="txt-item txt-no-urut" id="preview-{{ID}}-no-urut">No. Urut: {{NO_URUT}}</div>
      <div class="txt-item txt-kelas" id="preview-{{ID}}-kelas">Kelas: {{KELAS}}</div>
      <div class="txt-item txt-nama" id="preview-{{ID}}-nama">{{NAMA}}</div>
      <div class="txt-item txt-pengampu" id="preview-{{ID}}-pengampu">Pengampu: {{PENGAMPU}}</div>
      <div class="txt-item txt-penguji" id="preview-{{ID}}-penguji">Penguji: {{PENGUJI}}</div>
      <div class="txt-item txt-keterangan" id="preview-{{ID}}-keterangan">Ket: {{KET}}</div>
    </div>
  </template>

</body>
</html>
